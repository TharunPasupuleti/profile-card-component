<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile Card</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

    <div class="card">

        <div class="card-top"></div>

        <div class="profile">

            <img src="https://img.freepik.com/free-vector/illustration-hanuman-jayanti-with-lord-hanuman-celebration-background_1035-30936.jpg?semt=ais_rp_progressive&w=740&q=80"
                class="avatar">

            <h2>THARUN PASUPULETI <span>26</span></h2>
            <p class="city">GUNTUR,ANDHRA PRADESH</p>

        </div>

        <hr>

        <div class="stats">

            <div>
                <h3>80K</h3>
                <p>Followers</p>
            </div>

            <div>
                <h3>803K</h3>
                <p>Likes</p>
            </div>

            <div>
                <h3>1.4K</h3>
                <p>Photos</p>
            </div>

        </div>

    </div>

</body>

</html>
